name: Обновление фильтров Brave

on:
  schedule:
    # Запуск каждый день в 03:00 по UTC (глубокая ночь)
    - cron: '0 3 * * *'
  workflow_dispatch: # Позволяет запускать скрипт вручную по кнопке

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Запуск скрипта склейки фильтров
        run: python update_filters.txt.py
        # Обратите внимание, вызываем правильное имя файла
        run: python update_filters.py

      - name: Сохранение и пуш изменений
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add brave_ultimate_filter.txt
          git commit -m "Ежедневное обновление фильтров" || echo "Нет изменений для коммита"
          git push
